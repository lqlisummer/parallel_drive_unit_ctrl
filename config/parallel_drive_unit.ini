# Parallel drive unit example configuration

[network]
board_id = 0xFD
local_ip = 192.168.3.245
local_port = 15021
remote_ip = 192.168.3.11
remote_port = 14999

[motor2]
name = m2
can_id = 2
can_line = 1

[motor3]
name = m3
can_id = 3
can_line = 1

[control]
command_mode = pd
auto_enable = true
clear_fault_on_start = true
zero_on_start = false
position_kp = 1.0
velocity_kp = 0.05
velocity_ki = 1.0
pd_kp = 50.0
pd_kd = 5.0

[feedback]
fast_mode = false
fast_period_hz = 500

[runtime]
backend = mock
loop_hz = 200.0
synchronized_send = true
startup_flush_cycles = 2
print_feedback = true

[demo]
theta1_target_rad = 0.6
theta2_target_rad = 0.15
duration_s = 4.0
hold_s = 2.0
ramp_steps = 400
